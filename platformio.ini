; PlatformIO Project Configuration File
; ESP32-C3 SuperMini Watch with GC9A01 Round Display

[common]
platform = espressif32@6.9.0
board = esp32-c3-devkitm-1
framework = arduino

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^6.21.5
    ayushsharma82/ElegantOTA@^3.1.0

build_flags =
    ; TFT_eSPI GC9A01 configuration
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=6
    -DTFT_SCLK=5
    -DTFT_CS=8
    -DTFT_DC=7
    -DTFT_RST=9
    -DTFT_BL=-1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=6000000

monitor_speed = 115200
board_build.cdc_on_boot = 1
board_build.partitions = partitions.csv

; USB serial upload (default)
[env:esp32-c3-devkitm-1]
extends = common
upload_speed = 115200

; OTA upload: pio run -e ota -t upload --upload-port <IP>
[env:ota]
extends = common
upload_protocol = espota
